syntax = "proto3";

package wraith;

// Go package for generated code (Phase 3).
option go_package = "github.com/wraith/transfer/pkg/proto";

// ============================================================
// Core snapshot types
// ============================================================

// Full state of a single-threaded process at one point in time.
//
// Phase 1: registers only (memory_regions and file_descriptors are empty).
// Phase 2: all fields populated.
message ProcessSnapshot {
    // Source process identity
    uint32 pid  = 1;
    uint32 uid  = 2;
    string arch = 3;              // "x86_64"
    string kernel_version = 4;    // e.g. "Linux 6.1.0"
    uint64 captured_at_ns = 5;    // Unix nanoseconds

    // Process metadata
    SnapshotMetadata metadata = 6;

    // CPU state
    Registers registers = 10;

    // Memory (populated in Phase 2)
    repeated MemoryRegion memory_regions = 11;

    // File descriptors (populated in Phase 2)
    repeated FileDescriptor file_descriptors = 12;

    // Integrity
    uint64 checksum         = 20; // CRC-64/ECMA of the encoded snapshot (excluding this field)
    string snapshot_version = 21; // "1.0"
}

// x86-64 register state.
// Maps 1:1 to ptrace(PTRACE_GETREGS) / ptrace(PTRACE_SETREGS).
message Registers {
    // General-purpose registers
    uint64 rax = 1;
    uint64 rbx = 2;
    uint64 rcx = 3;
    uint64 rdx = 4;
    uint64 rdi = 5;
    uint64 rsi = 6;
    uint64 rbp = 7;
    uint64 rsp = 8;
    uint64 r8  = 9;
    uint64 r9  = 10;
    uint64 r10 = 11;
    uint64 r11 = 12;
    uint64 r12 = 13;
    uint64 r13 = 14;
    uint64 r14 = 15;
    uint64 r15 = 16;

    // Control
    uint64 rip    = 17;
    uint64 rflags = 18;

    // Segment registers
    uint64 cs      = 19;
    uint64 ss      = 20;
    uint64 ds      = 21;
    uint64 es      = 22;
    uint64 fs      = 23;
    uint64 gs      = 24;
    uint64 fs_base = 25; // TLS pointer
    uint64 gs_base = 26;

    // Raw FXSAVE block: FPU + MMX + SSE xmm0–xmm15.
    // Exactly sizeof(user_fpregs_struct) = 512 bytes on x86-64.
    bytes fpu_state = 27;
}

// One contiguous virtual memory region from /proc/<pid>/maps.
message MemoryRegion {
    uint64 start_addr = 1;
    uint64 end_addr   = 2;
    uint64 size_bytes = 3;

    // Permissions string from /proc/maps: "r", "w", "x", "p"/"s"
    string permissions = 4;

    // Semantic type: "heap", "stack", "vdso", "vsyscall", "file", "anon"
    string region_type = 5;

    // If file-backed: absolute path and offset within the file.
    string backing_file = 6;
    uint64 file_offset  = 7;

    // Raw page data. In Phase 3, only dirty pages are transmitted
    // (delta transfer); clean file-backed pages are skipped.
    bytes data = 8;

    // CRC-64/ECMA of `data`. Verified by the restorer before writing.
    uint64 checksum = 9;
}

// An open file descriptor captured from /proc/<pid>/fd + /proc/<pid>/fdinfo.
message FileDescriptor {
    uint32 fd_num     = 1;
    string fd_type    = 2; // "regular", "pipe", "socket", "device", "directory"
    string path       = 3; // resolved symlink target
    uint64 file_offset = 4; // current seek position
    uint32 flags      = 5; // open(2) flags (O_RDONLY, O_WRONLY, O_RDWR, ...)
}

// Metadata about the machine and process that was captured.
message SnapshotMetadata {
    string machine_hostname      = 1;
    string process_name          = 2;
    uint64 process_age_seconds   = 3; // uptime of the process at capture time
    uint32 thread_count          = 4; // v1: always 1
    uint64 virtual_memory_bytes  = 5; // VmSize from /proc/<pid>/status
    uint64 resident_memory_bytes = 6; // VmRSS
}

// ============================================================
// Network transport types (Phase 3)
// ============================================================

// Sent by the transmitter before any data to let the receiver prepare.
message Handshake {
    string source_hostname = 1;
    uint32 source_pid      = 2;
    string arch            = 3;   // must match destination arch
    uint64 total_bytes     = 4;   // expected total snapshot size
    uint32 page_count      = 5;   // total number of 4 KB pages
    string snapshot_version = 6;
}

// Sent by the receiver to signal it is ready.
message ReadyAck {
    bool   accepted = 1;
    string reason   = 2; // non-empty only when accepted=false
}

// A single 4 KB page transmitted as part of a delta transfer.
message DeltaBlock {
    uint64 virtual_address = 1; // target virtual address for this page
    bytes  data            = 2; // page content (4096 bytes, or less for tail)
    uint64 checksum        = 3; // xxHash-64 of data
}

// Sent by the receiver after all pages have been written.
message RestoreAck {
    bool   success    = 1;
    uint32 restored_pid = 2; // PID on destination (success=true only)
    string error      = 3;   // error message (success=false only)
}
